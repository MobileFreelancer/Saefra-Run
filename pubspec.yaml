name: saefra_run
description: "Saefra Run - A fitness running app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  go_router: ^14.8.1
  dio: ^5.8.0+1
  flutter_secure_storage: ^9.2.4
  flutter_dotenv: ^5.2.1
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  phone_form_field: ^9.0.5
  flutter_screenutil: ^5.9.3
  fluttertoast: ^9.1.0
  firebase_core: ^4.11.0
  google_maps_flutter: ^2.17.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
